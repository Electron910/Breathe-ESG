services:
  # Backend
  - type: web
    name: breathe-esg-backend
    env: python
    buildCommand: "cd breathe_esg_backend && pip install -r requirements.txt && python manage.py migrate"
    startCommand: "cd breathe_esg_backend && gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breathe-esg-frontend.onrender.com

  # Frontend
  - type: web
    name: breathe-esg-frontend
    env: static
    buildCommand: "cd breathe_esg_frontend && npm install && npm run build"
    staticPublishPath: "./breathe_esg_frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: https://breathe-esg-backend.onrender.com

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_user
